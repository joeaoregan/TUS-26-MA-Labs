site_name: TUS-26-MA-Labs
docs_dir: docs
site_dir: site

copyright: Copyright &copy; 2026 Joe O'Regan

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/joeaoregan/
    - icon: fontawesome/brands/github
      link: https://github.com/joeaoregan
    - icon: material/certificate
      link: https://www.credly.com/users/joe-o-regan
    - icon: simple/githubpages
      link: https://joeaoregan.github.io/      

theme:
  icon:
    admonition:
      note: material/account
      success: material/account
      warning: material/account
      danger: material/account
  logo: images/logo.png
  palette: 

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  name: material
  favicon: images/favicon.ico
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - toc.follow
    - navigation.footer
    - navigation.instant.preview
    - navigation.tracking
    - navigation.path
    - navigation.top

nav:
  - Home: 
    - index.md
    - External Links:    
      - MA CA1 GitHub: https://github.com/joeaoregan/TUS-26-MA-CA1-Guitar-Store-API
      - MA CA2 GitHub: https://github.com/joeaoregan/TUS-26-MA-CA2-Distributed-Microservice-App
  - 1-7 RESTFUL APIs:
    - Labs 1-7: labs1-7/index.md
    - 1. Getting Started with Spring Boot: labs1-7/lab1/index.md
    - 2. Configuring H2 DB and YAML application.properties: labs1-7/lab2/index.md
    - 3. Building a Rest API to support the creation of a new account and customer details: labs1-7/lab3/index.md
    - 4. Exception Handling - check if customer already exists: labs1-7/lab4/index.md
    - 5. Implementing a READ API that fetches the details based on mobile number: labs1-7/lab5/index.md
    - 6. RESTfulAPI for Updating and Deleting customer accounts: labs1-7/lab6/index.md
    - 7. Exceptions, Data Validations and Audit Columns: labs1-7/lab7/index.md
  - 8-9 RESTFUL APIs:
    - Labs 8-9: labs8-9/index.md
    - 8. Loans MicroService: labs8-9/lab8/index.md
    - 9. Cards MicroService: labs8-9/lab9/index.md
  - 10-19 Spring Cloud Config:
    - Labs 10-19: labs10-19/index.md
    - 10. Introduction to Spring Cloud Config: labs10-19/lab10/index.md
    - 11. Configuration with Environment interface: labs10-19/lab11/index.md
    - 12. Configuration with @ConfigurationProperties: labs10-19/lab12/index.md
  - API:
    - API Endpoints: api/index.md
    - Accounts API: api/accounts.md
    - Loans API: api/loans.md
    - Cards API: api/cards.md
  
markdown_extensions:
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  
  - material.extensions.preview:
      configurations:
        - targets:
            include:
              - labs1-7/*
              - labs8-9/*

repo_url: https://github.com/joeaoregan/TUS-26-MA-Labs
repo_name: GitHub

site_url: https://joeaoregan.github.io/TUS-26-MA-Labs/